name: Quality Gates

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  encoding-and-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check encoding
        run: npm run check:encoding

      - name: Type check
        run: npm run lint
